    <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control - Bici Interactiva</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: white;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 20px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      max-width: 500px;
      font-size: 28px;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 8px;
    }

    button {
      font-size: 24px;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .current {
      margin-top: 30px;
      font-size: 22px;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <h1>Bici Interactiva</h1>

  <form action="/api/name" method="POST">
    <label for="name">Nombre del participante</label>
    <input
      id="name"
      name="name"
      type="text"
      value="{{ participant_name }}"
      autocomplete="off"
      autofocus
    >

    <br>

    <button type="submit">Guardar nombre</button>
  </form>

  <div class="current">
    Participante actual: <strong>{{ participant_name }}</strong>
  </div>

</body>
</html>
