<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bici Interactiva</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="idle-mode">

  <div id="screen">
    <div id="stage">
      <video id="mainVideo" autoplay muted loop playsinline>
        <source src="/static/videos/idle.mp4" type="video/mp4">
      </video>

      <!-- OVERLAY GAME -->
      <div id="gameOverlay">

        <!-- Nombre en recuadro azul / superior izquierdo -->
        <div id="gameNameBox">
          <div id="gameName">PARTICIPANTE</div>
        </div>

        <!-- Ranking y puntos en recuadro rojo / superior derecho -->
        <div id="gameRankBox">
          <div id="gameRankPosition">--</div>
          <div id="gameScore">0000 pts</div>
        </div>

        <!-- Ranking cercano en recuadro verde -->
        <div id="gameNearbyRankingBox">
          <ol id="gameNearbyRankingList"></ol>
        </div>

      </div>

      <!-- OVERLAY RESULT -->
      <div id="resultOverlay">
        <div id="resultNameBox">
          <div id="resultName">PARTICIPANTE</div>
        </div>

        <div id="resultRankBox">
          <div id="resultRank">--</div>
        </div>

        <div id="resultListBox">
          <ol id="resultRankingList"></ol>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/display.js"></script>
</body>
</html>
